---
- name: Deploy Planet Shopify Application
  hosts: web
  become: yes

  tasks:
    - name: Install Git
      apt:
        name: git
        state: present
        update_cache: yes

    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Start Docker service
      service:
        name: docker
        state: started
        enabled: yes

    - name: Install Docker Compose
      apt:
        name: docker-compose-v2
        state: present

    - name: Clone Planet Shopify repository
      git:
        repo: "https://github.com/piyushsharma2205/Planet-Shopify.git"
        dest: /opt/planet-shopify
        version: main
        force: yes

    - name: Start application with Docker Compose
      command: docker compose up -d --build
      args:
        chdir: /opt/planet-shopify
